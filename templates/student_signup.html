<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signup - PRS</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <a href="{{ url_for('index') }}" class="back-link">Back</a>
    <div class="login-icon">+</div>
    <h2 class="login-title">Create Account</h2>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    <form method="POST">
      <div class="form-group">
        <label for="name">Username</label>
        <input type="text" id="name" name="name" placeholder="Enter username" required autocomplete="username" minlength="3">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter password" required autocomplete="new-password" minlength="4">
      </div>
      <div class="form-group">
        <label for="confirm_password">Confirm Password</label>
        <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm password" required autocomplete="new-password" minlength="4">
      </div>
      <button type="submit" class="btn btn-student btn-full">Create Account</button>
    </form>
    <p class="login-hint">Already a student? <a href="{{ url_for('student_login') }}" class="inline-link">Student login</a></p>
  </div>
</div>
</body>
</html>
