<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rate Presentation - PRS</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="rating-page">
  <header class="rating-header">
    <div class="rating-header-inner">
      <span class="rating-user">{{ user_name }}</span>
      <a href="{{ url_for('logout') }}" class="btn btn-logout btn-sm">Logout</a>
    </div>
  </header>

  <main class="rating-main">
    <div class="rating-card">
      <p class="rating-now-label">Currently Presenting</p>
      <h1 class="rating-presenter-name">{{ presenter_name }}</h1>

      <div class="divider"></div>

      <p class="rating-instruction">Select your rating from 1 to 10</p>

      <form method="POST" action="{{ url_for('submit_rating') }}" id="ratingForm">
        <input type="hidden" name="rating_score" id="ratingScore" value="">
        <input type="hidden" name="presentation_id" value="{{ presentation_id }}">

        <div class="rating-buttons">
          {% for i in range(1, 11) %}
          <button type="button" class="rating-btn" data-value="{{ i }}" onclick="selectRating({{ i }})">{{ i }}</button>
          {% endfor %}
        </div>

        <div class="rating-selected" id="ratingSelectedText">No rating selected</div>

        <button type="submit" class="btn btn-submit btn-full" id="submitBtn" disabled>Submit Rating</button>
      </form>
    </div>
  </main>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
