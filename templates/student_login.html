<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Login - PRS</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <a href="{{ url_for('index') }}" class="back-link">Back</a>
    <div class="login-icon">S</div>
    <h2 class="login-title">Student Login</h2>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    <form method="POST">
      <div class="form-group">
        <label for="name">Student Name</label>
        <input type="text" id="name" name="name" placeholder="Student 001" required autocomplete="name">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-student btn-full">Login as Student</button>
    </form>
    <p class="login-hint">New student? <a href="{{ url_for('student_signup') }}" class="inline-link">Create an account</a></p>
  </div>
</div>
</body>
</html>
